spring:
  datasource:
    url: ${SQLSERVER_URL}
    username: ${SQLSERVER_USERNAME}
    password: ${SQLSERVER_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false