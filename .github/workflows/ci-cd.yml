name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "123Mudar"
          MSSQL_PID: "Developer"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '123Mudar' -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      SQLSERVER_URL: jdbc:sqlserver://localhost:1433;databaseName=db_todolist;encrypt=true;trustServerCertificate=true
      SQLSERVER_USERNAME: sa
      SQLSERVER_PASSWORD: 123Mudar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Create database
        run: |
          docker exec "${{ job.services.sqlserver.id }}" /opt/mssql-tools18/bin/sqlcmd \
            -S localhost \
            -U sa \
            -P "$SQLSERVER_PASSWORD" \
            -C \
            -Q "IF DB_ID('db_todolist') IS NULL CREATE DATABASE db_todolist"

      - name: Dar permissão ao Maven Wrapper
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test

      - name: Package application
        run: ./mvnw package -DskipTests

      - name: Upload application artifact
        uses: actions/upload-artifact@v4
        with:
          name: todolist-api
          path: target/*.jar

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Download application artifact
        uses: actions/download-artifact@v4
        with:
          name: todolist-api
          path: app

      - name: Deploy application
        run: |
          echo "Configurar depois"
          ls -la app
