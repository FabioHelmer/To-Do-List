services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: todolist-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "123Mudar"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "123Mudar" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: todolist-sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./docker/sqlserver/init-db.sql:/init-db.sql:ro
    command: >
      /bin/bash -c "/opt/mssql-tools18/bin/sqlcmd
      -S sqlserver
      -U sa
      -P '123Mudar'
      -C
      -i /init-db.sql"

volumes:
  sqlserver_data:
